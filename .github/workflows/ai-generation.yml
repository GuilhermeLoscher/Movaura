name: Movaura AI Generation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ai-generation-tests:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q app.py core renderers ui plugins scripts

      - name: Run AI generation tests
        run: python scripts/run_ai_generation_tests.py

      - name: Run product self-test
        run: python app.py --self-test
