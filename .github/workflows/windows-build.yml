name: Movaura Windows Build

on:
  push:
    branches: [main, migration/pyside6]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Compile Python sources
        run: python -m compileall -q app.py core renderers ui plugins scripts

      - name: Check text encoding
        run: python scripts/check_encoding_artifacts.py app.py core renderers ui plugins scripts docs README.md LEIA-ME-PRIMEIRO.txt requirements.txt requirements-build.txt --report release/reports/encoding-audit.txt

      - name: Run AI generation tests
        run: python scripts/run_ai_generation_tests.py

      - name: Run product smoke tests
        run: python scripts/run_product_smoke_tests.py

      - name: Run product self-test
        run: python app.py --self-test

      - name: Check Qt binding source residue
        run: python scripts/check_no_pyqt_artifacts.py app.py core renderers ui plugins scripts requirements.txt requirements-build.txt README.md LEIA-ME-PRIMEIRO.txt native_host/README.md .github --report-base release/reports/qt-binding-audit

      - name: Build standalone
        shell: pwsh
        run: ./scripts/build_standalone.ps1 -PythonExe python

      - name: Run standalone self-test
        shell: pwsh
        run: ./dist/standalone/Movaura/Movaura.exe --self-test

      - name: Check standalone Qt binding residue
        run: python scripts/check_no_pyqt_artifacts.py --artifact dist/standalone/Movaura --report-base release/reports/qt-binding-audit-standalone

      - name: Build unsigned MSIX
        shell: pwsh
        run: ./scripts/build_msix_package.ps1 -StandalonePath ./dist/standalone/Movaura -PythonExe python

      - name: Generate package checksums
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path release/msix -Filter *.msix -File
          if (-not $packages) {
            throw "Nenhum pacote MSIX encontrado para gerar checksum."
          }
          $packages |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $($_.Path)" } |
            Set-Content -LiteralPath release/reports/msix-package-sha256.txt -Encoding UTF8

      - name: Generate license compliance evidence
        run: python scripts/prepare_license_compliance_docs.py

      - name: Validate license payload
        run: python scripts/validate_license_payload.py

      - name: Upload standalone artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Movaura-standalone-windows
          path: dist/standalone/Movaura

      - name: Upload MSIX artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Movaura-msix-unsigned
          path: release/msix/*.msix

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Movaura-validation-reports
          path: release/reports

      - name: Upload compliance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Movaura-license-compliance
          path: release/compliance
